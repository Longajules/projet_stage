<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — Pizza Pinos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Jost:wght@300;400;500&display=swap">
</head>
<body>

  <div class="pp-wrap">

    <header>
      <p class="pp-logo" onclick="window.location.href='index.html'" style="cursor:pointer;">Pizza Pinos</p>
      <div class="pp-rule"></div>
      <p class="pp-tagline">Saint-Just-en-Chaussée</p>
    </header>

    <main>
      <p class="section-title">Notre Menu</p>
      <p class="section-subtitle">Cliquez sur une carte pour l'agrandir.</p>

      <div class="menu-gallery">

        <div class="menu-img-card" onclick="openLightbox('pizza_menu1.png')">
          <img src="pizza_menu1.png" alt="Promotions & infos">
          <div class="menu-img-label">Promotions &amp; infos</div>
        </div>

        <div class="menu-img-card" onclick="openLightbox('pizza_menu2.png')">
          <img src="pizza_menu2.png" alt="Burgers, Paninis, Tex-Mex">
          <div class="menu-img-label">Burgers · Paninis · Tex-Mex</div>
        </div>

        <div class="menu-img-card" onclick="openLightbox('pizza_menu3.png')">
          <img src="pizza_menu3.png" alt="Pizzas & Couscous">
          <div class="menu-img-label">Pizzas &amp; Couscous</div>
        </div>

      </div>
    </main>

    <!--<hr class="pp-divider">-->

    <footer class="pp-footer">
      <p>© 2025 Pizza Pinos — Tous droits réservés</p>
      <p><a href="tel:0344514569" class="pp-footer-tel">03 44 51 45 69</a></p>
    </footer>

  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script src="main.js"></script>
  <script>
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>

</body>
</html>
