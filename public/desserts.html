<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burgers — Pizza Pinos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Jost:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

  <div class="pp-wrap">

    <header>
      <p class="pp-logo" id="icone">Pizza Pinos</p>
      <div class="pp-rule"></div>
      <p class="pp-tagline">Saint-Just-en-Chaussée</p>
    </header>

    <main>
      <h1 class="section-title" style="text-align:center;">Desserts</h1>

      <div class="product-list">

        <div class="product-card">
          <div class="product-icon"><i class="ti ti-meat"></i></div>
          <div class="product-info">
            <div class="product-header">
              <span class="product-name">Panini</span>
              <span class="product-price">3,00 €</span>
            </div>
          </div>
        </div>

        <div class="product-card">
          <div class="product-icon"><i class="ti ti-meat"></i></div>
          <div class="product-info">
            <div class="product-header">
              <span class="product-name">Tarte au Daim</span>
              <span class="product-price">2,50 €</span>
            </div>
          </div>
        </div>

        <div class="product-card">
          <div class="product-icon"><i class="ti ti-meat"></i></div>
          <div class="product-info">
            <div class="product-header">
              <span class="product-name">Cookie</span>
              <span class="product-price">2,50 €</span>
            </div>
          </div>
        </div>

        <div class="product-card">
          <div class="product-icon"><i class="ti ti-meat"></i></div>
          <div class="product-info">
            <div class="product-header">
              <span class="product-name">Tiramisu</span>
              <span class="product-price">4,00 €</span>
              <p class="product-desc">Fait maison</p>
            </div>
          </div>
        </div>

    </main>

    <hr class="pp-divider">

    <div class="pp-location">
      <i class="ti ti-map-pin" aria-hidden="true"></i>
      <div>
        <p class="pp-loc-label">Nous trouver</p>
        <p class="pp-loc-addr">53 Rue de Beauvais, 60130 Saint-Just-en-Chaussée</p>
        <a class="pp-loc-link" href="https://www.google.com/maps/place/Pizza+pinos/@49.5050026,2.4297826,18z" target="_blank">
          Ouvrir dans Google Maps <i class="ti ti-external-link" style="font-size:12px; vertical-align:-1px;"></i>
        </a>
      </div>
    </div>

    <footer class="pp-footer">
      <p>© 2026 Pizza Pinos — Tous droits réservés</p>
      <p><a href="tel:0344514569" class="pp-footer-tel">03 44 51 45 69</a></p>
    </footer>

  </div>

  <script src="main.js"></script>
</body>
</html>
